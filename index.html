.btn.small{padding:6px 11px;font-size:12px}
.btn.danger{color:var(--red);border-color:rgba(240,72,30,.3)}
a.btn{text-decoration:none;display:inline-block}

/* table */
.tablewrap{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.grid{width:100%;border-collapse:collapse}
.grid th{text-align:left;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--line);font-weight:600}
.grid th.num{width:46px}
.grid td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.grid tbody tr{cursor:pointer;transition:.1s}
.grid tbody tr:hover{background:var(--panel2)}
.grid tbody tr:last-child td{border-bottom:none}
.toprow{background:linear-gradient(90deg,var(--accent-dim),transparent 40%)}
.num{font-family:var(--mono);text-align:left}
.rank{color:var(--muted);font-weight:700}
.toprow .rank{color:var(--accent)}
.coName{font-weight:600}
.coSub{color:var(--muted);font-size:11px;font-family:var(--mono)}
.typeTag{font-size:11px;font-family:var(--mono);color:var(--muted);border:1px solid var(--line);padding:2px 7px;border-radius:5px;white-space:nowrap}
.chev{color:var(--muted);font-size:20px;text-align:right;width:30px}

/* meter */
.meter{position:relative;width:96px;height:20px;background:var(--panel2);border-radius:5px;overflow:hidden;display:flex;align-items:center}
.meterFill{position:absolute;left:0;top:0;bottom:0;opacity:.32;border-radius:5px}
.meterVal{position:relative;font-family:var(--mono);font-weight:700;font-size:13px;padding-left:9px}

/* badges */
.statusBadge{font-size:11px;font-weight:600;border:1px solid;padding:3px 9px;border-radius:99px;white-space:nowrap}
.fuBadge{font-size:12px;font-weight:600;font-family:var(--mono);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.muted{color:var(--muted)}
.small{font-size:12px}

/* empty */
.empty,.miniEmpty{text-align:center;padding:48px 20px;border:1px dashed var(--line);border-radius:12px;background:var(--panel)}
.miniEmpty{padding:24px;font-size:13px;color:var(--muted)}
.emptyTitle{font-weight:700;margin-bottom:6px}
.emptyText{color:var(--muted);margin-bottom:18px}

/* drawer */
.drawerScrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:40;display:flex;justify-content:flex-end}
.drawer{width:min(560px,100%);background:var(--panel);height:100%;overflow-y:auto;border-left:1px solid var(--line);animation:slide .18s ease}
@keyframes slide{from{transform:translateX(24px);opacity:.6}to{transform:none;opacity:1}}
.drawerHead{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.drawerName{background:none;border:none;color:var(--ink);font-size:18px;font-weight:700;width:100%;font-family:var(--sans)}
.drawerName-static{font-size:18px;font-weight:700}
.drawerName:focus{outline:none;border-bottom:1px solid var(--accent)}
.drawerMeta{display:flex;gap:8px;align-items:center;margin-top:6px;color:var(--muted);font-size:12px}
.iconBtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;flex-shrink:0}
.iconBtn:hover{color:var(--ink)}
.scoreHero{display:flex;gap:16px;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.scoreBig{font-family:var(--mono);font-size:46px;font-weight:800;line-height:1}
.scoreBand{font-weight:700}
.segmented{display:flex;gap:4px;padding:14px 22px 0}
.segmented button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans)}
.segmented button.on{color:var(--ink);border-color:var(--accent);background:var(--accent-dim)}
.drawerBody{padding:18px 22px 40px}
.sectionLabel{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:20px 0 10px;font-weight:600}

/* fields */
.field{display:block;margin-bottom:13px}
.field>span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--ink);font-size:13px;font-family:var(--sans);resize:vertical}
.field input:focus,.field textarea:focus,.select:focus{outline:none;border-color:var(--accent)}
.fieldRow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* score rows */
.scoreRow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.scoreRowLabel{font-size:13px;display:flex;flex-direction:column;gap:2px}
.wTag{font-family:var(--mono);font-size:11px;color:var(--accent)}
.hint{font-size:11px;color:var(--muted)}
.scoreDots{display:flex;gap:4px;flex-shrink:0}
.dotBtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:12px}
.dotBtn:hover{border-color:var(--muted)}
.dotBtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* outreach drawer */
.outreachStat{display:flex;gap:18px;padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.outreachStat>div{display:flex;flex-direction:column;gap:4px;font-size:13px}
.outreachStat .muted{font-size:11px}
.mailField{margin-bottom:8px}
.mailSubject{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:600}
.mailBody{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:13px;font-size:12.5px;white-space:pre-wrap;font-family:var(--sans);line-height:1.6;margin:6px 0 14px;max-height:300px;overflow:auto}
.mailActions{display:flex;gap:10px;margin:6px 0}
.finePrint{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.5}

/* logic */
.panelIntro{margin-bottom:18px;max-width:680px}
.panelIntro h2{font-size:20px;margin:0 0 6px;letter-spacing:-.3px}
.panelIntro p{color:var(--muted);font-size:13px;margin:0}
.panelIntro b{color:var(--ink)}
.logicList{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.logicRow{display:flex;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.logicMain{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.logicLabel{background:none;border:none;color:var(--ink);font-size:14px;font-weight:600;font-family:var(--sans)}
.logicHint{background:none;border:none;color:var(--muted);font-size:12px;font-family:var(--sans)}
.logicLabel:focus,.logicHint:focus{outline:none}
.weightCtl{display:flex;align-items:center;gap:9px;flex-shrink:0}
.weightCtl input[type=range]{accent-color:var(--accent);width:90px}
.weightNum{font-family:var(--mono);font-weight:700;width:14px;color:var(--accent)}

/* outreach grid */
.outreachGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.card h3{margin:0 0 6px;font-size:15px}
.card.sending{grid-column:1/-1}
.card code{background:var(--panel2);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--cyan)}
.dueList{list-style:none;margin:12px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
.dueItem{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.dueName{font-weight:600;font-size:13px}
.dueRight{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cadenceRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
.cadenceChip{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 9px}
.cadenceChip input{width:46px;background:none;border:none;color:var(--ink);font-family:var(--mono);font-size:14px;font-weight:700;text-align:center}
.cadenceChip input:focus{outline:none}
.xMini{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0 2px}
.xMini:hover{color:var(--red)}
.howList{margin:10px 0 0;padding-left:18px;color:var(--muted);font-size:12.5px;line-height:1.7}
.howList b{color:var(--ink)}

/* markets */
.regionCard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px}
.regionHead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.regionName{background:none;border:none;color:var(--ink);font-size:16px;font-weight:700;font-family:var(--sans);flex-shrink:0}
.regionName:focus{outline:none;border-bottom:1px solid var(--accent)}
.regionHead .muted{flex:1}
.chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.countryChip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12.5px}
.chipCount{background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:99px;font-weight:700}
.countryAdd input{background:transparent;border:1px dashed var(--line);border-radius:7px;padding:5px 9px;color:var(--ink);font-size:12.5px;width:96px;font-family:var(--sans)}
.countryAdd input:focus{outline:none;border-color:var(--accent)}

/* export menu */
.exportWrap{position:relative}
.menu{position:absolute;right:0;top:42px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px;min-width:200px;z-index:30;box-shadow:0 12px 30px rgba(0,0,0,.4)}
.menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);padding:9px 11px;border-radius:7px;cursor:pointer;font-size:13px;font-family:var(--sans)}
.menu button:hover{background:var(--panel)}
.menuDanger{color:var(--red)!important;border-top:1px solid var(--line)!important;border-radius:0!important;margin-top:4px}
.menuSep{height:1px;background:var(--line);margin:4px 0}
.importCard{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(560px,calc(100% - 32px));max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.importBody{padding:0 20px 20px}
.csvHint{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:12px}
.csvHint code{background:var(--bg);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--cyan)}
.fileInput{display:block;margin-bottom:10px;color:var(--muted);font-size:12px}
.importArea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px;color:var(--ink);font-family:var(--mono);font-size:12px;resize:vertical}
.importArea:focus{outline:none;border-color:var(--accent)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.adminToggle{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.adminToggle.on{color:var(--ink);border-color:var(--green)}
.adminDot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.adminToggle.on .adminDot{background:var(--green);box-shadow:0 0 8px var(--green)}
.liMini{font-family:var(--mono);font-size:10px;color:var(--cyan);text-decoration:none;border:1px solid var(--line);padding:0 5px;border-radius:4px;margin-left:7px}
.liMini:hover{border-color:var(--cyan)}
.liLink{display:inline-block;color:var(--cyan);font-size:12px;text-decoration:none;margin:-6px 0 12px}
.liLink:hover{text-decoration:underline}
.approvalRow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.apprBadge{font-size:11px;font-weight:600;border:1px solid;padding:3px 10px;border-radius:99px;white-space:nowrap}
.btn.full{width:100%}
.disabledLink{opacity:.45;cursor:not-allowed;pointer-events:none}
.adminCallout{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--accent-dim);border:1px solid var(--accent);border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px}
.apprList{list-style:none;margin:10px 0 6px;padding:0;display:flex;flex-direction:column;gap:8px}
.apprItem{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.apprItem.sentItem{opacity:.7}
.apprMain{min-width:0;flex:1}

/* dashboard */
.dash{display:flex;flex-direction:column;gap:16px}
.kpiRow{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 14px}
.kpi.click{cursor:pointer;transition:.12s}
.kpi.click:hover{border-color:var(--accent)}
.kpiVal{font-family:var(--mono);font-size:30px;font-weight:800;line-height:1}
.kpiLabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:7px}
.dashAlert{display:flex;align-items:center;gap:9px;background:rgba(240,72,30,.12);border:1px solid rgba(240,72,30,.4);color:var(--red);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer}
.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dashWide{grid-column:1/-1}
.dashTable th,.dashTable td{padding:9px 12px}
.dashTable tbody tr{cursor:default}
.dashTable tbody tr:hover{background:transparent}
.barRow{display:flex;align-items:center;gap:10px;margin:8px 0}
.barLabel{font-size:12px;width:150px;flex-shrink:0}
.barTrack{flex:1;height:9px;background:var(--panel2);border-radius:5px;overflow:hidden}
.barFill{height:100%;border-radius:5px;min-width:2px;transition:width .3s}
.barNum{font-family:var(--mono);font-size:13px;font-weight:700;width:26px;text-align:right}
.compStat{display:flex;gap:28px;padding:6px 0 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
.compBig{font-family:var(--mono);font-size:32px;font-weight:800;line-height:1}
.compList{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.compItem{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:13px}
.compFlag{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid var(--cyan);color:var(--cyan)}
.compFlag.conflict{border-color:var(--red);color:var(--red)}
.compBrands{color:var(--muted);font-size:12px}
.compNote{font-size:12px;border-radius:8px;padding:8px 11px;margin-bottom:12px;border:1px solid var(--cyan);color:var(--cyan);background:rgba(126,214,255,.08)}
.compNote.conflict{border-color:var(--red);color:var(--red-soft);background:rgba(240,72,30,.08)}
.statusMini{display:flex;gap:5px;flex-wrap:wrap}
.smChip{font-size:10px;border:1px solid;padding:1px 6px;border-radius:99px;white-space:nowrap}
.oppList{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.oppItem{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer}
.oppItem:hover{border-color:var(--accent)}
.oppRank{font-family:var(--mono);font-weight:800;color:var(--accent);width:18px}
.oppMain{flex:1;display:flex;flex-direction:column}
@media(max-width:820px){.kpiRow{grid-template-columns:repeat(3,1fr)}.dashGrid{grid-template-columns:1fr}.barLabel{width:110px}}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4)}

@media(max-width:720px){
  .outreachGrid{grid-template-columns:1fr}
  .fieldRow2{grid-template-columns:1fr}
  .main{padding:16px}
  .meter{width:72px}
}
`}</style>
  );
}
