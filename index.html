<!-- Auth gate + OneDrive storage (loginRedirect flow; local fallback if disabled) -->
<script>
(function () {
  var BRAND = { bg:"#0a0e16", navy:"#0c1c34", accent:"#4a8cf7", ink:"#eef3fb", muted:"#8aa0c0", red:"#f0481e", green:"#34bd9c", line:"rgba(140,170,210,.16)" };
  var HAS_LS = (function(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();

  function localStorageAdapter(){
    var mem = {};
    function rd(k){ return HAS_LS ? localStorage.getItem(k) : (k in mem ? mem[k] : null); }
    function wr(k,v){ if(HAS_LS) localStorage.setItem(k,v); else mem[k]=v; }
    function del(k){ if(HAS_LS) localStorage.removeItem(k); else delete mem[k]; }
    return {
      get: function(k){ var v=rd(k); return Promise.resolve(v==null?null:{key:k,value:v,shared:false}); },
      set: function(k,v){ wr(k,v); return Promise.resolve({key:k,value:v,shared:false}); },
      "delete": function(k){ del(k); return Promise.resolve({key:k,deleted:true}); },
      list: function(p){ p=p||""; var a=[]; if(HAS_LS){ for(var i=0;i<localStorage.length;i++){ var key=localStorage.key(i); if(key.indexOf(p)===0) a.push(key); } } else { a=Object.keys(mem).filter(function(x){return x.indexOf(p)===0;}); } return Promise.resolve({keys:a,prefix:p}); }
    };
  }

  // OneDrive on the SHARED demo@ drive. Mirrors the Sales Tracker: resolve the
  // file via /me/drive/sharedWithMe, else path-address /users/{upn}/drive root.
  function oneDriveAdapter(cfg, getToken){
    var fileName = (cfg.filePath.split("/").pop() || "").toLowerCase();
    var ref = null;  // { driveId, itemId } once resolved
    var CACHE = "__oxe_cloudcache", t=null, last=null;
    function userPathUrl(){ return "https://graph.microsoft.com/v1.0/users/" + encodeURIComponent(cfg.sharedDriveUser) + "/drive/root:" + cfg.filePath + ":/content"; }
    function itemUrl(r){ return "https://graph.microsoft.com/v1.0/drives/" + encodeURIComponent(r.driveId) + "/items/" + encodeURIComponent(r.itemId) + "/content"; }
    function resolveRef(tok, force){
      if (ref && !force) return Promise.resolve(ref);
      return fetch("https://graph.microsoft.com/v1.0/me/drive/sharedWithMe", { headers:{ Authorization:"Bearer "+tok } })
        .then(function(r){ return r.ok ? r.json() : { value:[] }; })
        .then(function(b){
          var items = (b && b.value) || [];
          for (var i=0;i<items.length;i++){
            var it = items[i], ri = it.remoteItem || it;
            var nm = ((it.name || ri.name || "")).toLowerCase();
            var dId = ri.parentReference && ri.parentReference.driveId, iId = ri.id;
            if (dId && iId && nm === fileName){ ref = { driveId:dId, itemId:iId }; return ref; }
          }
          return null;
        }).catch(function(){ return null; });
    }
    function pull(){
      return getToken().then(function(tok){
        return resolveRef(tok).then(function(r){
          var url = r ? itemUrl(r) : userPathUrl();
          return fetch(url, { headers:{ Authorization:"Bearer "+tok } }).then(function(res){
            if (res.status===404) return null;
            if (!res.ok) throw new Error("graph "+res.status);
            return res.text();
          });
        });
      }).catch(function(){ return HAS_LS ? localStorage.getItem(CACHE) : null; });
    }
    function push(val){
      return getToken().then(function(tok){
        return resolveRef(tok).then(function(r){
          var url = r ? itemUrl(r) : userPathUrl();
          return fetch(url, { method:"PUT", headers:{ Authorization:"Bearer "+tok, "Content-Type":"application/json" }, body: val })
            .then(function(res){
              if (res.status===404 && r){ ref=null; return fetch(userPathUrl(), { method:"PUT", headers:{ Authorization:"Bearer "+tok, "Content-Type":"application/json" }, body: val }); }
              return res;
            });
        });
      }).catch(function(){});
    }
    return {
      get: function(k){ return pull().then(function(v){ if (v!=null && HAS_LS) localStorage.setItem(CACHE,v); return v==null?null:{key:k,value:v,shared:false}; }); },
      set: function(k,v){ if(HAS_LS) localStorage.setItem(CACHE,v); last=v; clearTimeout(t); t=setTimeout(function(){ push(last); }, 2000); return Promise.resolve({key:k,value:v}); },
      "delete": function(k){ if(HAS_LS) localStorage.removeItem(CACHE); return Promise.resolve({key:k,deleted:true}); },
      list: function(){ return Promise.resolve({keys:[]}); }
    };
  }

  function screen(inner){ document.getElementById("root").innerHTML =
    '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:'+BRAND.bg+';font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:'+BRAND.ink+';padding:24px;">'+inner+'</div>'; }
  function card(inner){ return '<div style="background:'+BRAND.navy+';border:1px solid '+BRAND.line+';border-radius:16px;padding:34px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);">'+inner+'</div>'; }
  function mark(){ return '<div style="width:46px;height:46px;border-radius:11px;background:'+BRAND.accent+';color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:17px;">CV</div>'; }
  function msg(s){ var m=document.getElementById("oxeMsg"); if(m) m.textContent=s||""; }
  function renderSignIn(onClick){
    screen(card(mark()
      + '<div style="font-size:18px;font-weight:700;margin-bottom:6px;">OxeFit Distribution Builder</div>'
      + '<div style="color:'+BRAND.muted+';font-size:13px;margin-bottom:22px;">Core Velocity · admin access only</div>'
      + '<button id="oxeSignIn" style="width:100%;background:'+BRAND.accent+';color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;">Sign in with Microsoft</button>'
      + '<div id="oxeMsg" style="color:'+BRAND.red+';font-size:12px;margin-top:12px;min-height:16px;"></div>'
      + '<div style="color:'+BRAND.muted+';font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:.4px;margin-top:6px;">'+(window.__OXE_VERSION__||'')+'</div>'));
    document.getElementById("oxeSignIn").onclick = onClick;
  }
  function renderDenied(email){
    screen(card(mark()
      + '<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:'+BRAND.red+';">Access denied</div>'
      + '<div style="color:'+BRAND.muted+';font-size:13px;margin-bottom:20px;">'+ (email?('"'+email+'" is'):'This account is') +' not authorized for this tool. Admin access only.</div>'
      + '<button onclick="window.__oxeSignOut&&window.__oxeSignOut()" style="background:'+BRAND.bg+';color:'+BRAND.ink+';border:1px solid '+BRAND.line+';border-radius:9px;padding:10px 16px;font-size:13px;cursor:pointer;">Sign in as someone else</button>'
      + '<div style="color:'+BRAND.muted+';font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:.4px;margin-top:16px;">'+(window.__OXE_VERSION__||'')+'</div>'));
  }

  window.__oxeBoot = function(){
    return new Promise(function(resolve){
      var cfg = window.MS_CONFIG || {};
      if (!cfg.enabled) { if (!(window.storage && window.storage.get)) window.storage = localStorageAdapter(); return resolve(true); }
      if (typeof msal === "undefined") { console.warn("MSAL unavailable — running locally."); window.storage = localStorageAdapter(); return resolve(true); }

      var pca = new msal.PublicClientApplication({
        auth: { clientId: cfg.clientId, authority: cfg.authority, redirectUri: location.origin + location.pathname },
        cache: { cacheLocation: "localStorage" }
      });
      var scopes = cfg.scopes || ["Files.ReadWrite.All", "User.Read"];
      function emailOf(a){ return (a && (a.username || "")).toLowerCase(); }
      function allowed(a){ var l=(cfg.adminAllowlist||[]).map(function(s){return s.toLowerCase();}); return l.length===0 || l.indexOf(emailOf(a))>=0; }
      function getToken(){
        return pca.acquireTokenSilent({ scopes: scopes, account: pca.getActiveAccount() }).then(function(r){ return r.accessToken; })
          .catch(function(){ pca.acquireTokenRedirect({ scopes: scopes }); return new Promise(function(){}); });  // navigates away
      }
      window.__oxeSignOut = function(){ try { pca.logoutRedirect(); } catch(e){ location.reload(); } };

      function proceed(account){
        if (!allowed(account)) { renderDenied(emailOf(account)); return resolve(false); }
        pca.setActiveAccount(account);
        window.__OXE_USER__ = account.username;
        window.__OXE_ADMIN__ = true;
        window.storage = oneDriveAdapter(cfg, getToken);
        // direct send from the signed-in admin's Outlook via Microsoft Graph
        window.__oxeSendMail = function(to, subject, bodyText){
          return getToken().then(function(tok){
            return fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
              method: "POST",
              headers: { Authorization: "Bearer " + tok, "Content-Type": "application/json" },
              body: JSON.stringify({ message: { subject: subject, body: { contentType: "Text", content: bodyText }, toRecipients: [{ emailAddress: { address: to } }] }, saveToSentItems: true })
            }).then(function(res){ return res.ok; });
          });
        };
        return resolve(true);
      }

      // loginRedirect flow (popup breaks on GitHub Pages via COOP — Sales Tracker lesson)
      pca.handleRedirectPromise().then(function(resp){
        if (resp && resp.account) return proceed(resp.account);
        var accts = pca.getAllAccounts();
        if (accts && accts.length) return proceed(accts[0]);
        renderSignIn(function(){ msg("Redirecting to Microsoft…"); pca.loginRedirect({ scopes: scopes, prompt: "select_account" }); });
      }).catch(function(){
        renderSignIn(function(){ pca.loginRedirect({ scopes: scopes, prompt: "select_account" }); });
      });
    });
  };
})();
</script>

/* =========================================================================

   A distributor pipeline + scoring + outreach console.
   - Define scoring CRITERIA (the "logic") and weight them per market reality.
   - Add prospects (distributors / dealers / resellers) per region & country.
   - Each prospect is scored -> ranked -> top candidates surface automatically.
   - Outreach cadence computes follow-up due dates and surfaces overdue ones.
   - Email drafts are generated from an editable template (copy / open in mail).
   - State persists between sessions via window.storage.
   NOTE: This tool drafts + tracks. Actual email SENDING stays with you
   (Copy / Open in Mail) so a human approves every send.
   ========================================================================= */

const STORAGE_KEY = "oxefit_distribution_state_v1";
const APP_VERSION = (typeof window !== "undefined" && window.__OXE_VERSION__) || "v1.0";
const todayISO = () => new Date().toISOString().slice(0, 10);
const uid = () => Math.random().toString(36).slice(2, 9);

const STATUS = {
  new: { label: "New", color: "var(--muted)" },
  email_shared: { label: "Email Shared", color: "var(--cyan)" },

};
const ACTIVE_OUTREACH = ["email_shared", "follow_up"]; // statuses that need follow-up
// migrate older saved statuses to the current set
const STATUS_MIGRATE = { contacted: "email_shared", responded: "follow_up", in_discussion: "follow_up", won: "follow_up" };

/* ---- scoring ---- */
function weightedScore(prospect, criteria) {
  const totalW = criteria.reduce((s, c) => s + (Number(c.weight) || 0), 0);
  if (!totalW) return 0;
  const got = criteria.reduce((s, c) => s + ((Number(prospect.scores?.[c.id]) || 0) / 5) * (Number(c.weight) || 0), 0);
  return Math.round((got / totalW) * 100);
}
function scoreBand(s) {
  if (s >= 80) return { label: "Prime", color: "var(--green)" };
  if (s >= 60) return { label: "Strong", color: "var(--cyan)" };
  if (s >= 40) return { label: "Possible", color: "var(--accent)" };
  return { label: "Weak", color: "var(--red-soft)" };
}

/* ---- follow-up logic ---- */
function nextFollowUp(prospect, cadence) {
  if (!ACTIVE_OUTREACH.includes(prospect.status) || !prospect.lastContacted) return null;
  const idx = Math.min(prospect.contactCount, cadence.length - 1);
  const stepDays = cadence[Math.max(0, idx)] ?? cadence[cadence.length - 1];
  const base = new Date(prospect.lastContacted + "T00:00:00");
  base.setDate(base.getDate() + Number(stepDays));
  return base.toISOString().slice(0, 10);
}
function followUpState(prospect, cadence) {
  const due = nextFollowUp(prospect, cadence);
  if (!due) return null;
  const diff = Math.round((new Date(due) - new Date(todayISO())) / 86400000);
  if (diff < 0) return { due, kind: "overdue", days: Math.abs(diff) };
  if (diff <= 2) return { due, kind: "soon", days: diff };
  return { due, kind: "scheduled", days: diff };
}

function fillTemplate(tpl, ctx) {
  return tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => (ctx[k] ?? `{{${k}}}`));
}

/* Microsoft Outlook web compose deeplink — opens a pre-filled draft the user reviews & sends */

  const q = new URLSearchParams({ to: to || "", subject: subject || "", body: body || "" });
  return `https://outlook.office.com/mail/deeplink/compose?${q.toString()}`;
}
/* .eml content (X-Unsent makes Outlook desktop open it as an editable draft) */
function buildEml({ to, subject, body }) {
  return ["To: " + (to || ""), "Subject: " + (subject || ""), "X-Unsent: 1",
    "Content-Type: text/plain; charset=utf-8", "", body || ""].join("\r\n");
}

/* minimal CSV parser: quoted fields, embedded commas, escaped quotes, CRLF */
function parseCSV(text) {
  const rows = []; let row = [], field = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
      else field += ch;
    } else if (ch === '"') q = true;
    else if (ch === ",") { row.push(field); field = ""; }
    else if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
    else if (ch === "\r") { /* skip */ }
    else field += ch;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter((r) => r.some((c) => c.trim() !== ""));
}

/* map imported rows to prospects; score columns (s1…s8) align to criteria by position */
function rowsToProspects(rows, criteria) {
  if (!rows.length) return [];
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const has = (name) => header.indexOf(name) >= 0;
  const idx = (name) => header.indexOf(name);
  const hasHeader = has("name");
  const body = hasHeader ? rows.slice(1) : rows;
  const col = (r, name, fb) => { const i = has(name) ? idx(name) : fb; return i >= 0 ? (r[i] ?? "").trim() : ""; };
  const scoreCols = header.map((h, i) => (/^s\d+$/.test(h) ? i : -1)).filter((i) => i >= 0);
  return body.map((r) => {
    const sVals = scoreCols.map((i) => Number(r[i]) || 0);
    const scores = {};
    criteria.forEach((c, i) => { scores[c.id] = Math.max(0, Math.min(5, sVals[i] ?? 0)); });
    return {
      id: uid(),
      name: col(r, "name", 0) || "Unnamed",
      type: col(r, "type", 1) || "Distributor",
      region: col(r, "region", 2) || "",
      country: col(r, "country", 3) || "",
      website: col(r, "website", 4) || "",
      decisionMaker: col(r, "decisionmaker", 8) || "",
      linkedIn: col(r, "linkedin", 9) || "",
      competitors: col(r, "competitors", 10) || "",
      contactName: col(r, "contactname", 5) || "",
      contactEmail: col(r, "contactemail", 6) || "",
      notes: col(r, "notes", 7) || "",
      scores, status: "new", lastContacted: null, contactCount: 0, emailApproval: "none",
    };
  }).filter((p) => p.name && p.name !== "Unnamed");
}

/* append, skipping duplicates by name+country (case-insensitive) */
function mergeProspects(existing, incoming) {
  const key = (p) => `${(p.name || "").toLowerCase().trim()}|${(p.country || "").toLowerCase().trim()}`;
  const seen = new Set(existing.map(key));
  const added = incoming.filter((p) => !seen.has(key(p)));
  return { merged: [...existing, ...added], addedCount: added.length, skipped: incoming.length - added.length };
}

function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState("");
  const [admin, setAdmin] = useState(() => typeof window !== "undefined" && !!window.__OXE_ADMIN__);
  const saveTimer = useRef(null);

  // backfill new fields + migrate old statuses on any loaded/imported data
  const normalize = (s) => {
    if (!s || !Array.isArray(s.prospects)) return s;
    // bump the outreach email template to the latest all-sector version
    if (s.emailTemplateVersion !== EMAIL_TEMPLATE_VERSION) {
      s.emailTemplate = { subject: DEFAULT_EMAIL.subject, body: DEFAULT_EMAIL.body };
      s.emailTemplateVersion = EMAIL_TEMPLATE_VERSION;
    }
    s.prospects = s.prospects.map((p) => ({
      decisionMaker: "", linkedIn: "", emailApproval: "none", competitors: "", emailSubject: "", emailBody: "",
      ...p,
      competitors: p.competitors || COMPETITORS[p.name] || "",
      status: STATUS_MIGRATE[p.status] || p.status || "new",
    }));
    return s;
  };

  /* load */
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY);
        setState(normalize(r?.value ? JSON.parse(r.value) : defaultState()));
      } catch {
        setState(normalize(defaultState()));
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  /* save (debounced) */
  useEffect(() => {
    if (!loaded || !state) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({ ...state, updatedAt: new Date().toISOString() }));
      } catch { /* in-memory only; export to be safe */ }
    }, 500);
  }, [state, loaded]);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 1800); };
  const patch = (fn) => setState((s) => { const n = structuredClone(s); fn(n); return n; });

  if (!loaded || !state) {
    return <div className="oxe-root"><Style /><div className="loadwrap">Loading distribution console…</div></div>;
  }

  const overdueCount = state.prospects.filter((p) => followUpState(p, state.cadence)?.kind === "overdue").length;
  const pendingCount = state.prospects.filter((p) => p.emailApproval === "pending").length;

  const tabs = [
    ["dashboard", "Dashboard"],
    ["pipeline", "Pipeline"],
    ["logic", "Scoring logic"],
    ["outreach", "Outreach & reminders"],
    ["approvals", `Approvals${pendingCount ? ` (${pendingCount})` : ""}`],
    ["markets", "Regions"],
  ];

  return (
    <div className="oxe-root">
      <Style />
      <header className="topbar">
        <div className="brand">
          <span className="brandMark">CV</span>
          <div>
            <div className="brandTitle">Distribution Builder <span className="verTag">{APP_VERSION}</span></div>
            <div className="brandSub">{state.distributor} · global distributor for <b>OxeFit</b></div>
          </div>
        </div>
        <div className="topActions">
          {typeof window !== "undefined" && window.__OXE_USER__ && (
            <div className="userChip" title={window.__OXE_USER__}>
              <span className="userDot" />
              <span className="userName">{window.__OXE_USER__}</span>
              <button className="signOut" onClick={() => window.__oxeSignOut && window.__oxeSignOut()}>Sign out</button>
            </div>
          )}
          {overdueCount > 0 && (
            <button className="alertPill" onClick={() => setTab("outreach")}>
              <span className="dot" /> {overdueCount} follow-up{overdueCount > 1 ? "s" : ""} overdue
            </button>
          )}
          <button className={`adminToggle ${admin ? "on" : ""}`} onClick={() => setAdmin((a) => !a)} title="Admin can approve emails for sending">
            <span className="adminDot" /> Admin {admin ? "on" : "off"}
          </button>
          <ExportMenu state={state} flash={flash} setState={setState} />
        </div>
      </header>

      <nav className="tabs">
        {tabs.map(([k, label]) => (
          <button key={k} className={`tab ${tab === k ? "on" : ""}`} onClick={() => setTab(k)}>{label}</button>
        ))}
      </nav>

      <main className="main">
        {tab === "dashboard" && <Dashboard state={state} setTab={setTab} />}
        {tab === "pipeline" && <Pipeline state={state} patch={patch} flash={flash} setState={setState} admin={admin} />}
        {tab === "logic" && <Logic state={state} patch={patch} />}
        {tab === "outreach" && <Outreach state={state} patch={patch} flash={flash} />}

        {tab === "markets" && <Markets state={state} patch={patch} />}
      </main>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );

function Dashboard({ state, setTab }) {
  const P = state.prospects;
  const scored = P.map((p) => ({ ...p, _s: weightedScore(p, state.criteria), _fu: followUpState(p, state.cadence) }));
  const avg = scored.length ? Math.round(scored.reduce((a, b) => a + b._s, 0) / scored.length) : 0;
  const countries = [...new Set(P.map((p) => p.country).filter(Boolean))];
  const prime = scored.filter((p) => p._s >= 60).length;
  const inOutreach = P.filter((p) => ACTIVE_OUTREACH.includes(p.status)).length;
  const pending = P.filter((p) => p.emailApproval === "pending").length;
  const overdue = scored.filter((p) => p._fu?.kind === "overdue").length;

  const statusCounts = Object.keys(STATUS).reduce((m, k) => { m[k] = P.filter((p) => p.status === k).length; return m; }, {});
  const byCountry = countries.map((c) => {
    const rows = scored.filter((p) => p.country === c);
    return {
      country: c, region: rows[0]?.region || "", n: rows.length,
      avg: Math.round(rows.reduce((a, b) => a + b._s, 0) / rows.length),
      statuses: Object.keys(STATUS).reduce((m, k) => { m[k] = rows.filter((p) => p.status === k).length; return m; }, {}),
    };
  }).sort((a, b) => b.n - a.n || b.avg - a.avg);
  const withComp = scored.filter((p) => competitorHit(p).length);
  const conflicts = scored.filter(hasConflict);
  const drivers = state.criteria.map((c) => ({ label: c.label, n: P.filter((p) => (p.scores?.[c.id] ?? 0) >= 4).length }))
    .sort((a, b) => b.n - a.n).slice(0, 6);
  const untapped = scored.filter((p) => p.status === "new").sort((a, b) => b._s - a._s).slice(0, 5);

  if (!P.length) {
    return <div className="empty"><div className="emptyTitle">No prospects yet.</div><div className="emptyText">Load a set from the Data menu, then come back for the overview.</div></div>;
  }

  return (
    <div className="dash">
      <div className="kpiRow">
        <Kpi label="Distributors" value={P.length} onClick={() => setTab("pipeline")} />
        <Kpi label="Countries" value={countries.length} />
        <Kpi label="Avg fit" value={avg} suffix="%" color={scoreBand(avg).color} />
        <Kpi label="Strong+ (≥60)" value={prime} color="var(--green)" />
        <Kpi label="In outreach" value={inOutreach} color="var(--cyan)" onClick={() => setTab("outreach")} />
        <Kpi label="Pending approval" value={pending} color="var(--accent)" onClick={() => setTab("approvals")} />
      </div>
      {overdue > 0 && <div className="dashAlert" onClick={() => setTab("outreach")}><span className="dot" /> {overdue} follow-up{overdue > 1 ? "s" : ""} overdue — open the worklist</div>}

      <div className="dashGrid">
        <section className="card dashWide">
          <h3>Distributors by country</h3>
          <table className="grid dashTable">
            <thead><tr><th>Country</th><th>Region</th><th className="num">#</th><th className="num">Avg fit</th><th>Status mix</th></tr></thead>
            <tbody>
              {byCountry.map((r) => (
                <tr key={r.country}>
                  <td><b>{r.country}</b></td>
                  <td className="muted">{r.region}</td>
                  <td className="num">{r.n}</td>
                  <td className="num"><Meter value={r.avg} color={scoreBand(r.avg).color} /></td>
                  <td><StatusMini counts={r.statuses} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </section>

        <section className="card">
          <h3>Pipeline status</h3>
          {Object.entries(STATUS).map(([k, v]) => {
            const n = statusCounts[k]; const pct = P.length ? Math.round((n / P.length) * 100) : 0;
            return (
              <div className="barRow" key={k}>
                <span className="barLabel" style={{ color: v.color }}>{v.label}</span>
                <div className="barTrack"><div className="barFill" style={{ width: `${pct}%`, background: v.color }} /></div>
                <span className="barNum">{n}</span>
              </div>
            );

        </section>

        <section className="card dashWide">
          <h3>Competitor exposure <span className="muted small">— who already carries an OxeFit rival</span></h3>

            <div><div className="compBig" style={{ color: "var(--red)" }}>{conflicts.length}</div><div className="muted small">flagged CONFLICT (Technogym / Life Fitness family)</div></div>
            <div><div className="compBig" style={{ color: "var(--accent)" }}>{withComp.length}</div><div className="muted small">carry a premium-connected brand (channel proven)</div></div>

            <div className="barRow" key={d.label}>
              <span className="barLabel">{d.label}</span>

              <span className="barNum">{d.n}</span>
            </div>
          ))}
        </section>

        <section className="card dashWide">
          <h3>Top untapped opportunities <span className="muted small">— highest fit, not yet contacted</span></h3>
          {untapped.length === 0 ? <div className="miniEmpty">Everyone's been contacted.</div> : (
            <ul className="oppList">
              {untapped.map((p, i) => (
                <li key={p.id} className="oppItem" onClick={() => setTab("pipeline")}>
                  <span className="oppRank">{i + 1}</span>
                  <div className="oppMain"><b>{p.name}</b><span className="muted small">{p.country} · {p.type}{p.decisionMaker ? ` · ${p.decisionMaker}` : ""}</span></div>
                  <Meter value={p._s} color={scoreBand(p._s).color} />
                </li>
              ))}
            </ul>
          )}
        </section>
      </div>
    </div>
  );
}
function Kpi({ label, value, suffix, color, onClick }) {
  return (
    <div className={`kpi ${onClick ? "click" : ""}`} onClick={onClick}>
      <div className="kpiVal" style={color ? { color } : undefined}>{value}{suffix || ""}</div>
      <div className="kpiLabel">{label}</div>
    </div>
  );
}
function StatusMini({ counts }) {
  const items = Object.entries(STATUS).filter(([k]) => counts[k] > 0);
  if (!items.length) return <span className="muted small">—</span>;
  return <span className="statusMini">{items.map(([k, v]) => <span key={k} className="smChip" style={{ color: v.color, borderColor: v.color }}>{counts[k]} {v.label}</span>)}</span>;
}

      .filter((p) => fType === "all" || p.type === fType)
      .filter((p) => fStatus === "all" || p.status === fStatus)
      .filter((p) => fBand === "all" || (p._score >= bandMin[fBand] && p._score < bandMax[fBand]))
      .filter((p) => !fConflict || hasConflict(p))
      .filter((p) => !q || [p.name, p.country, p.decisionMaker, p.competitors, p.contactName, p.notes].some((x) => (x || "").toLowerCase().includes(q)))
      .sort((a, b) => b._score - a._score);
  }, [state, fRegion, fCountry, fType, fStatus, fBand, fConflict, search]);

  const top10 = ranked.slice(0, 10);
  const clearAll = () => { setFRegion("all"); setFCountry("all"); setFType("all"); setFStatus("all"); setFBand("all"); setFConflict(false); setSearch(""); };
  const activeFilters = (fRegion !== "all") + (fCountry !== "all") + (fType !== "all") + (fStatus !== "all") + (fBand !== "all") + (fConflict ? 1 : 0) + (search.trim() ? 1 : 0);

  return (
    <div>
      <div className="bar">
        <input className="searchBox" placeholder="Search company, country, decision-maker, brand…" value={search} onChange={(e) => setSearch(e.target.value)} />
        <button className="btn primary" onClick={() => setAdding(true)}>+ Add prospect</button>
      </div>
      <div className="bar">
        <div className="filters">
          <Select value={fRegion} onChange={(v) => { setFRegion(v); setFCountry("all"); }} options={[["all", "All regions"], ...state.regions.map((r) => [r.name, r.name])]} />
          <Select value={fCountry} onChange={setFCountry} options={[["all", "All countries"], ...countryOptions.map((c) => [c, c])]} />
          <Select value={fType} onChange={setFType} options={[["all", "All types"], ["Distributor", "Distributor"], ["Dealer", "Dealer"], ["Reseller", "Reseller"], ["Fit-out", "Fit-out"], ["Partner", "Partner"]]} />
          <Select value={fStatus} onChange={setFStatus} options={[["all", "All status"], ...Object.entries(STATUS).map(([k, v]) => [k, v.label])]} />
          <Select value={fBand} onChange={setFBand} options={[["all", "All fit"], ["prime", "Prime ≥80"], ["strong", "Strong 60–79"], ["possible", "Possible 40–59"], ["weak", "Weak <40"]]} />
          <button className={`chipToggle ${fConflict ? "on" : ""}`} onClick={() => setFConflict((v) => !v)}>⚠ Conflicts only</button>
          {activeFilters > 0 && <button className="btn ghost small" onClick={clearAll}>Clear ({activeFilters})</button>}
        </div>
      </div>

      <div className="legend">
        Ranked by weighted fit score · top 10 highlighted · {ranked.length} of {state.prospects.length} shown
      </div>

      {ranked.length === 0 ? (
        <Empty onAdd={() => setAdding(true)} />
      ) : (
        <div className="tablewrap">
          <table className="grid">
            <thead>
              <tr>
                <th className="num">#</th>
                <th>Company</th>
                <th>Country</th>
                <th>Type</th>
                <th className="num">Fit</th>
                <th>Status</th>
                <th>Follow-up</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {ranked.map((p, i) => {
                const band = scoreBand(p._score);
                const isTop = i < 10;
                return (
                  <tr key={p.id} className={isTop ? "toprow" : ""} onClick={() => setOpen(p.id)}>
                    <td className="num rank">{i + 1}</td>
                    <td>
                      <div className="coName">{p.name}</div>
                      <div className="coSub">
                        {p.decisionMaker ? p.decisionMaker : <span className="muted">— add decision-maker</span>}
                        {p.linkedIn && <a className="liMini" href={p.linkedIn} target="_blank" rel="noreferrer" onClick={(e) => e.stopPropagation()}>in↗</a>}
                      </div>
                    </td>
                    <td>{p.country || "—"}</td>
                    <td><span className="typeTag">{p.type}</span></td>
                    <td className="num">
                      <Meter value={p._score} color={band.color} />
                    </td>
                    <td><StatusBadge status={p.status} /></td>
                    <td>{p._fu ? <FollowUpBadge fu={p._fu} /> : <span className="muted">—</span>}</td>
                    <td className="chev">›</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {open && (
        <Drawer
          prospect={state.prospects.find((p) => p.id === open)}
          state={state}
          patch={patch}
          flash={flash}
          admin={admin}
          onClose={() => setOpen(null)}
          onDelete={() => { setState((s) => ({ ...s, prospects: s.prospects.filter((x) => x.id !== open) })); setOpen(null); }}
        />
      )}
      {adding && (
        <AddProspect
          state={state}
          onClose={() => setAdding(false)}
          onAdd={(p) => { setState((s) => ({ ...s, prospects: [...s.prospects, p] })); setAdding(false); flash("Prospect added"); }}
        />
      )}
    </div>
  );
}

function Empty({ onAdd }) {
  return (
    <div className="empty">
      <div className="emptyTitle">No prospects match these filters.</div>
      <div className="emptyText">Add a distributor, dealer, or reseller — or clear the filters to see everyone.</div>
      <button className="btn primary" onClick={onAdd}>+ Add your first prospect</button>
    </div>
  );
}

function Meter({ value, color }) {
  return (
    <div className="meter" title={`${value}/100`}>
      <div className="meterFill" style={{ width: `${value}%`, background: color }} />
      <span className="meterVal" style={{ color }}>{value}</span>
    </div>
  );
}
function StatusBadge({ status }) {
  const s = STATUS[status] || STATUS.new;
  return <span className="statusBadge" style={{ color: s.color, borderColor: s.color }}>{s.label}</span>;
}
function FollowUpBadge({ fu }) {
  const map = { overdue: "var(--red)", soon: "var(--accent)", scheduled: "var(--muted)" };
  const txt = fu.kind === "overdue" ? `Overdue ${fu.days}d` : fu.kind === "soon" ? (fu.days === 0 ? "Due today" : `Due in ${fu.days}d`) : `Due ${fu.due}`;
  return <span className="fuBadge" style={{ color: map[fu.kind] }}>{fu.kind === "overdue" && <span className="dot" />}{txt}</span>;
}

/* ============================== DRAWER ============================== */
function Drawer({ prospect, state, patch, flash, onClose, onDelete, admin }) {
  const [view, setView] = useState("score"); // score | email
  if (!prospect) return null;
  const score = weightedScore(prospect, state.criteria);
  const band = scoreBand(score);

  const setScore = (cid, val) => patch((n) => {
    const p = n.prospects.find((x) => x.id === prospect.id);
    p.scores = { ...p.scores, [cid]: val };
  });
  const setField = (field, val) => patch((n) => {
    const p = n.prospects.find((x) => x.id === prospect.id);
    p[field] = val;
  });
  const setApproval = (val) => setField("emailApproval", val);

  // logs an actual send: advances communication status + follow-up timer + approval=sent
  const logSent = () => patch((n) => {
    const p = n.prospects.find((x) => x.id === prospect.id);
    p.lastContacted = todayISO();
    p.contactCount = (p.contactCount || 0) + 1;
    p.status = p.status === "email_shared" ? "follow_up" : "email_shared";
    p.emailApproval = "sent";
  });

  const ctx = {
    contactName: prospect.contactName || "there",
    company: prospect.name,
    country: prospect.country || "your market",
    distributor: state.distributor,
    senderName: state.senderName || "[your name]",
  };
  const subject = prospect.emailSubject || fillTemplate(state.emailTemplate.subject, ctx);
  const body = prospect.emailBody || fillTemplate(state.emailTemplate.body, ctx);
  const to = prospect.contactEmail || "";
  const outlookUrl = outlookCompose({ to, subject, body });
  const approval = prospect.emailApproval || "none";

  const copy = async (text, label) => {
    try { await navigator.clipboard.writeText(text); flash(`${label} copied`); }
    catch { flash("Copy blocked — select & copy manually"); }
  };
  const downloadEml = () => {
    const blob = new Blob([buildEml({ to, subject, body })], { type: "message/rfc822" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${prospect.name.replace(/[^\w]+/g, "_")}.eml`; a.click();
    URL.revokeObjectURL(url);
  };
  const resetDraft = () => { setField("emailSubject", ""); setField("emailBody", ""); flash("Reset to template"); };
  const canSendDirect = typeof window !== "undefined" && typeof window.__oxeSendMail === "function";
  const sendNow = async () => {
    if (!to) return;
    if (!window.confirm(`Send this email now from your Outlook to ${to}?`)) return;
    flash("Sending…");
    try {
      const ok = await window.__oxeSendMail(to, subject, body);
      if (ok === false) { flash("Send failed — check Mail.Send permission"); return; }
      logSent();
      flash("Sent via Outlook");
    } catch (e) { flash("Send failed — " + ((e && e.message) || "error")); }
  };

  return (
    <div className="drawerScrim" onClick={onClose}>
      <aside className="drawer" onClick={(e) => e.stopPropagation()}>
        <div className="drawerHead">
          <div>
            <input className="drawerName" value={prospect.name} onChange={(e) => setField("name", e.target.value)} />
            <div className="drawerMeta">
              <span className="typeTag">{prospect.type}</span>
              <span>{prospect.country || "—"} · {prospect.region || "—"}</span>
            </div>
          </div>
          <button className="iconBtn" onClick={onClose}>✕</button>
        </div>

        <div className="scoreHero">
          <div className="scoreBig" style={{ color: band.color }}>{score}</div>
          <div>
            <div className="scoreBand" style={{ color: band.color }}>{band.label} fit</div>
            <div className="muted small">weighted across {state.criteria.length} criteria</div>
          </div>
        </div>

        <div className="segmented">
          <button className={view === "score" ? "on" : ""} onClick={() => setView("score")}>Score & details</button>
          <button className={view === "email" ? "on" : ""} onClick={() => setView("email")}>Outreach email</button>
        </div>

        {view === "score" ? (
          <div className="drawerBody">
            <div className="fieldRow2">
              <Field label="Decision-maker / CEO" value={prospect.decisionMaker} onChange={(v) => setField("decisionMaker", v)} />
              <Field label="LinkedIn profile URL" value={prospect.linkedIn} onChange={(v) => setField("linkedIn", v)} />
            </div>
            {prospect.linkedIn && (
              <a className="liLink" href={prospect.linkedIn} target="_blank" rel="noreferrer">↗ Open LinkedIn profile</a>
            )}
            <FieldArea label="Competitor brands carried" value={prospect.competitors} onChange={(v) => setField("competitors", v)} rows={2} />
            {competitorHit(prospect).length > 0 && (
              <div className={hasConflict(prospect) ? "compNote conflict" : "compNote"}>
                {hasConflict(prospect) ? "⚠ Aligned to a direct competitor — " : "✓ Premium-connected channel proven — "}
                {competitorHit(prospect).join(", ")}
              </div>
            )}
            <div className="fieldRow2">
              <Field label="Contact name" value={prospect.contactName} onChange={(v) => setField("contactName", v)} />
              <Field label="Contact email" value={prospect.contactEmail} onChange={(v) => setField("contactEmail", v)} />
            </div>
            <div className="fieldRow2">
              <Field label="Website" value={prospect.website} onChange={(v) => setField("website", v)} />
              <SelectField label="Type" value={prospect.type} onChange={(v) => setField("type", v)} options={["Distributor", "Dealer", "Reseller", "Fit-out", "Partner"]} />
            </div>
            <FieldArea label="Notes" value={prospect.notes} onChange={(v) => setField("notes", v)} />

            <div className="sectionLabel">Criteria scores (0–5)</div>
            {state.criteria.map((c) => (
              <div className="scoreRow" key={c.id}>
                <div className="scoreRowLabel">
                  {c.label}
                  <span className="wTag">×{c.weight}</span>
                  {c.hint && <span className="hint">{c.hint}</span>}
                </div>
                <div className="scoreDots">
                  {[0, 1, 2, 3, 4, 5].map((v) => (
                    <button key={v} className={`dotBtn ${(prospect.scores?.[c.id] ?? 0) === v ? "on" : ""}`} onClick={() => setScore(c.id, v)}>{v}</button>
                  ))}
                </div>
              </div>
            ))}
            <button className="btn ghost danger" onClick={onDelete}>Delete prospect</button>
          </div>
        ) : (
          <div className="drawerBody">
            <div className="outreachStat">
              <div><span className="muted">Status</span><StatusBadge status={prospect.status} /></div>
              <div><span className="muted">Contacts</span><b>{prospect.contactCount || 0}</b></div>
              <div><span className="muted">Last</span><b>{prospect.lastContacted || "—"}</b></div>
            </div>
            <SelectField label="Update status" value={prospect.status} onChange={(v) => setField("status", v)} options={Object.keys(STATUS)} render={(k) => STATUS[k].label} />

            <div className="sectionLabel">Email — edit before approving</div>
            <div className="mailField"><span className="muted small">To</span><div className="mailSubject">{to || "⚠ add a contact email"}</div></div>
            <label className="field">
              <span>Subject</span>
              <input value={subject} disabled={approval === "sent"} onChange={(e) => setField("emailSubject", e.target.value)} />
            </label>
            <label className="field">
              <span>Body {prospect.emailBody ? <em className="muted small">· edited</em> : <em className="muted small">· from template</em>}</span>
              <textarea rows={15} value={body} disabled={approval === "sent"} onChange={(e) => setField("emailBody", e.target.value)} />
            </label>
            <div className="mailActions">
              <button className="btn ghost small" onClick={resetDraft} disabled={approval === "sent" || (!prospect.emailBody && !prospect.emailSubject)}>Reset to template</button>
              <button className="btn ghost small" onClick={() => copy(`${subject}\n\n${body}`, "Email")}>Copy</button>
            </div>

            <div className="sectionLabel">Approval &amp; send</div>
            <div className="approvalRow">
              <span className="apprBadge" style={{ color: APPROVAL[approval].color, borderColor: APPROVAL[approval].color }}>{APPROVAL[approval].label}</span>
              {!to && <span className="muted small">⚠ add a contact email to send</span>}
            </div>

            {approval === "none" || approval === "rejected" ? (
              <button className="btn primary full" onClick={() => { setApproval("pending"); flash("Submitted for admin approval"); }}>Submit for approval</button>
            ) : approval === "pending" ? (
              admin ? (
                <div className="mailActions">
                  <button className="btn ghost danger" onClick={() => { setApproval("rejected"); flash("Rejected"); }}>Reject</button>
                  <button className="btn primary" onClick={() => { setApproval("approved"); flash("Approved to send"); }}>Approve</button>
                </div>
              ) : (
                <p className="finePrint">Waiting for an admin to approve this email. Toggle <b>Admin</b> in the header to review it.</p>
              )
            ) : approval === "approved" ? (
              <div>
                {canSendDirect && <button className="btn primary full" onClick={sendNow} disabled={!to} style={{ marginBottom: 8 }}>✉ Send now via Outlook</button>}
                <div className="mailActions">
                  <button className="btn ghost" onClick={downloadEml} disabled={!to}>Download .eml</button>
                  <a className={`btn ghost ${!to ? "disabledLink" : ""}`} href={to ? outlookUrl : undefined} target="_blank" rel="noreferrer" onClick={() => to && logSent()}>Open in Outlook compose</a>
                </div>
                <p className="finePrint">{canSendDirect
                  ? '"Send now" sends this approved email straight from your Outlook (ahmed@core-velocity.com). "Open in Outlook compose" instead drops a pre-filled draft for you to review and send.'
                  : '"Open in Outlook compose" opens a pre-filled draft in Outlook on the web — review and press send there. Sign in with Microsoft to enable one-click "Send now".'}</p>
              </div>
            ) : (
              <p className="finePrint">Sent on {prospect.lastContacted}. Follow-up is now on the cadence timer. Re-submit if you want to send again.</p>
            )}

            <button className="btn ghost danger small" onClick={onDelete} style={{ marginTop: 16 }}>Delete prospect</button>
          </div>
        )}
      </aside>
    </div>
  );
}

/* ============================== ADD PROSPECT ============================== */
function AddProspect({ state, onClose, onAdd }) {
  const firstRegion = state.regions[0];
  const [f, setF] = useState({
    name: "", type: "Distributor", region: firstRegion?.name || "",
    country: firstRegion?.countries?.[0] || "", website: "", decisionMaker: "", linkedIn: "",
    competitors: "", contactName: "", contactEmail: "", notes: "",
  });
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const countries = state.regions.find((r) => r.name === f.region)?.countries || [];
  const submit = () => {
    if (!f.name.trim()) return;
    const scores = Object.fromEntries(state.criteria.map((c) => [c.id, 0]));
    onAdd({ id: uid(), ...f, scores, status: "new", lastContacted: null, contactCount: 0, emailApproval: "none" });
  };
  return (
    <div className="drawerScrim" onClick={onClose}>
      <aside className="drawer" onClick={(e) => e.stopPropagation()}>
        <div className="drawerHead">
          <div className="drawerName-static">Add prospect</div>
          <button className="iconBtn" onClick={onClose}>✕</button>
        </div>
        <div className="drawerBody">
          <Field label="Company name" value={f.name} onChange={(v) => set("name", v)} autoFocus />
          <div className="fieldRow2">
            <SelectField label="Type" value={f.type} onChange={(v) => set("type", v)} options={["Distributor", "Dealer", "Reseller", "Fit-out", "Partner"]} />
            <SelectField label="Region" value={f.region} onChange={(v) => { set("region", v); const cs = state.regions.find((r) => r.name === v)?.countries || []; set("country", cs[0] || ""); }} options={state.regions.map((r) => r.name)} />
          </div>
          <div className="fieldRow2">
            <SelectField label="Country" value={f.country} onChange={(v) => set("country", v)} options={countries} />
            <Field label="Website" value={f.website} onChange={(v) => set("website", v)} />
          </div>
          <div className="fieldRow2">
            <Field label="Decision-maker / CEO" value={f.decisionMaker} onChange={(v) => set("decisionMaker", v)} />
            <Field label="LinkedIn profile URL" value={f.linkedIn} onChange={(v) => set("linkedIn", v)} />
          </div>
          <Field label="Competitor brands carried (Technogym, Life Fitness, Speediance…)" value={f.competitors} onChange={(v) => set("competitors", v)} />
          <div className="fieldRow2">
            <Field label="Contact name" value={f.contactName} onChange={(v) => set("contactName", v)} />
            <Field label="Contact email" value={f.contactEmail} onChange={(v) => set("contactEmail", v)} />
          </div>
          <FieldArea label="Notes" value={f.notes} onChange={(v) => set("notes", v)} />
          <div className="mailActions">
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn primary" onClick={submit}>Add to pipeline</button>
          </div>
          <p className="finePrint">Score it next from the pipeline so it ranks against the rest.</p>
        </div>
      </aside>
    </div>
  );
}

/* ============================== SCORING LOGIC ============================== */
function Logic({ state, patch }) {
  const totalW = state.criteria.reduce((s, c) => s + (Number(c.weight) || 0), 0);
  const add = () => patch((n) => n.criteria.push({ id: uid(), label: "New criterion", weight: 3, hint: "" }));
  const setC = (id, k, v) => patch((n) => { const c = n.criteria.find((x) => x.id === id); c[k] = v; });
  const del = (id) => patch((n) => {
    n.criteria = n.criteria.filter((x) => x.id !== id);
    n.prospects.forEach((p) => { if (p.scores) delete p.scores[id]; });
  });
  return (
    <div>
      <div className="panelIntro">
        <h2>Scoring logic</h2>
        <p>This is the engine that ranks every prospect. Weight reflects how much each factor matters for OxeFit specifically — connected hardware on a subscription means <b>service capability</b> and <b>premium channel fit</b> carry the most. Edit freely; rankings recompute instantly.</p>
      </div>
      <div className="logicList">
        {state.criteria.map((c) => (
          <div className="logicRow" key={c.id}>
            <div className="logicMain">
              <input className="logicLabel" value={c.label} onChange={(e) => setC(c.id, "label", e.target.value)} />
              <input className="logicHint" placeholder="what good looks like…" value={c.hint} onChange={(e) => setC(c.id, "hint", e.target.value)} />
            </div>
            <div className="weightCtl">
              <span className="muted small">weight</span>
              <input type="range" min="1" max="5" value={c.weight} onChange={(e) => setC(c.id, "weight", Number(e.target.value))} />
              <span className="weightNum">{c.weight}</span>
            </div>
            <button className="iconBtn" onClick={() => del(c.id)}>✕</button>
          </div>
        ))}
      </div>
      <div className="bar">
        <div className="muted small">Total weight: {totalW} · scores normalize to 0–100 regardless of total</div>
        <button className="btn ghost" onClick={add}>+ Add criterion</button>
      </div>
    </div>
  );
}

/* ============================== OUTREACH & REMINDERS ============================== */
function Outreach({ state, patch, flash }) {
  const due = state.prospects
    .map((p) => ({ ...p, _fu: followUpState(p, state.cadence) }))
    .filter((p) => p._fu)
    .sort((a, b) => new Date(a._fu.due) - new Date(b._fu.due));

  const setCadence = (i, v) => patch((n) => { n.cadence[i] = Math.max(0, Number(v) || 0); });
  const addStep = () => patch((n) => n.cadence.push((n.cadence[n.cadence.length - 1] || 0) + 7));
  const delStep = (i) => patch((n) => { if (n.cadence.length > 1) n.cadence.splice(i, 1); });
  const setTpl = (k, v) => patch((n) => { n.emailTemplate[k] = v; });
  const setSender = (v) => patch((n) => { n.senderName = v; });

  const markContacted = (id) => patch((n) => {
    const p = n.prospects.find((x) => x.id === id);
    p.lastContacted = todayISO();
    p.contactCount = (p.contactCount || 0) + 1;
    flash("Logged — follow-up rescheduled");
  });

  return (
    <div className="outreachGrid">
      <section className="card">
        <h3>Follow-up worklist</h3>
        <p className="muted small">Every prospect mid-outreach with a due or overdue nudge, soonest first. This is your reminder queue each time you open the console.</p>
        {due.length === 0 ? (
          <div className="miniEmpty">Nothing due. Log a contact on a prospect to start its timer.</div>
        ) : (
          <ul className="dueList">
            {due.map((p) => (
              <li key={p.id} className="dueItem">
                <div>
                  <div className="dueName">{p.name}</div>
                  <div className="muted small">{p.country} · contact #{(p.contactCount || 0) + 1} · {p.contactEmail || "no email"}</div>
                </div>
                <div className="dueRight">
                  <FollowUpBadge fu={p._fu} />
                  <button className="btn ghost small" onClick={() => markContacted(p.id)}>Mark contacted</button>
                </div>
              </li>
            ))}
          </ul>
        )}
      </section>

      <section className="card">
        <h3>Reminder cadence</h3>
        <p className="muted small">Days after the previous contact before the next nudge is due. Step 1 = first touch, then each follow-up.</p>
        <div className="cadenceRow">
          {state.cadence.map((d, i) => (
            <div className="cadenceChip" key={i}>
              <span className="muted small">#{i + 1}</span>
              <input type="number" min="0" value={d} onChange={(e) => setCadence(i, e.target.value)} />
              <span className="muted small">d</span>
              {state.cadence.length > 1 && <button className="xMini" onClick={() => delStep(i)}>✕</button>}
            </div>
          ))}
          <button className="btn ghost small" onClick={addStep}>+ step</button>
        </div>
      </section>

      <section className="card">
        <h3>Email template</h3>
        <p className="muted small">Merge fields fill per prospect: <code>{"{{contactName}}"}</code> <code>{"{{company}}"}</code> <code>{"{{country}}"}</code> <code>{"{{distributor}}"}</code> <code>{"{{senderName}}"}</code>.</p>
        <Field label="Your name (sender)" value={state.senderName} onChange={setSender} />
        <Field label="Subject" value={state.emailTemplate.subject} onChange={(v) => setTpl("subject", v)} />
        <FieldArea label="Body" value={state.emailTemplate.body} onChange={(v) => setTpl("body", v)} rows={12} />
        <div className="mailActions">
          <button className="btn ghost small" onClick={() => patch((n) => { n.emailTemplate = { subject: DEFAULT_EMAIL.subject, body: DEFAULT_EMAIL.body }; })}>Reset to OxeFit default</button>
        </div>
        <p className="finePrint">This is the master template (covers all seven OxeFit verticals). Per-distributor tweaks happen in each prospect's Outreach email tab before approval — those don't change this master.</p>
      </section>

      <section className="card sending">
        <h3>About automated sending</h3>
        <p className="muted small">
          This console drafts and tracks; it doesn't fire emails on its own. Inside a chat artifact there's no inbox connection and no background scheduler, and auto-sending on your behalf isn't something done without you approving each message. Two clean ways to close that loop:
        </p>
        <ul className="howList">
          <li><b>Manual + tracked (now):</b> open each draft in your mail client, send, log it — the worklist then reminds you exactly when to follow up.</li>
          <li><b>Connected (next):</b> wire your mailbox via an email connector or a small backend with a scheduler; you (or an approval step) still confirm sends. Export below feeds that pipeline.</li>
        </ul>
      </section>
    </div>
  );
}

/* ============================== APPROVALS ============================== */
function Approvals({ state, patch, flash, admin, setAdmin }) {
  const pending = state.prospects.filter((p) => p.emailApproval === "pending");
  const approved = state.prospects.filter((p) => p.emailApproval === "approved");
  const sent = state.prospects.filter((p) => p.emailApproval === "sent");

  const setApproval = (id, val, msg) => { patch((n) => { n.prospects.find((x) => x.id === id).emailApproval = val; }); flash(msg); };
  const draftFor = (p) => {
    const ctx = { contactName: p.contactName || "there", company: p.name, country: p.country || "your market", distributor: state.distributor, senderName: state.senderName || "[your name]" };
    return { to: p.contactEmail || "", subject: p.emailSubject || fillTemplate(state.emailTemplate.subject, ctx), body: p.emailBody || fillTemplate(state.emailTemplate.body, ctx) };
  };
  const sendLog = (id) => patch((n) => {
    const p = n.prospects.find((x) => x.id === id);
    p.lastContacted = todayISO(); p.contactCount = (p.contactCount || 0) + 1;
    p.status = p.status === "email_shared" ? "follow_up" : "email_shared"; p.emailApproval = "sent";
  });
  const canSendDirect = typeof window !== "undefined" && typeof window.__oxeSendMail === "function";
  const sendDirect = async (p) => {
    const d = draftFor(p);
    if (!d.to) return;
    if (!window.confirm(`Send now from your Outlook to ${d.to}?`)) return;
    flash("Sending…");
    try {
      const ok = await window.__oxeSendMail(d.to, d.subject, d.body);
      if (ok === false) { flash("Send failed — check Mail.Send permission"); return; }
      sendLog(p.id); flash("Sent via Outlook");
    } catch (e) { flash("Send failed"); }
  };

  return (
    <div>
      <div className="panelIntro">
        <h2>Email approvals</h2>
        <p>The admin gate for outreach. Drafts submitted from a prospect's <b>Outreach email</b> tab land here. An admin approves, then anyone can open the approved draft in <b>Microsoft Outlook</b> to review and send. Nothing leaves automatically.</p>
      </div>

      {!admin && (
        <div className="adminCallout">
          You're in viewer mode — you can submit drafts but not approve them.
          <button className="btn ghost small" onClick={() => setAdmin(true)}>Switch to admin</button>
        </div>
      )}

      <div className="sectionLabel">Pending approval ({pending.length})</div>
      {pending.length === 0 ? <div className="miniEmpty">No drafts waiting. Submit one from a prospect's Outreach email tab.</div> : (
        <ul className="apprList">
          {pending.map((p) => {
            const d = draftFor(p);
            return (
              <li key={p.id} className="apprItem">
                <div className="apprMain">
                  <div className="dueName">{p.name} <span className="muted small">· {p.country}</span></div>
                  <div className="muted small">{d.to || "⚠ no email"} · {d.subject}</div>
                </div>
                <div className="dueRight">
                  {admin ? (
                    <>
                      <button className="btn ghost small danger" onClick={() => setApproval(p.id, "rejected", "Rejected")}>Reject</button>
                      <button className="btn primary small" onClick={() => setApproval(p.id, "approved", "Approved")}>Approve</button>
                    </>
                  ) : <span className="apprBadge" style={{ color: "var(--citron)", borderColor: "var(--citron)" }}>Pending</span>}
                </div>
              </li>
            );
          })}
        </ul>
      )}

      <div className="sectionLabel">Approved — ready to send ({approved.length})</div>
      {approved.length === 0 ? <div className="miniEmpty">Nothing approved yet.</div> : (
        <ul className="apprList">
          {approved.map((p) => {
            const d = draftFor(p);
            return (
              <li key={p.id} className="apprItem">
                <div className="apprMain">
                  <div className="dueName">{p.name} <span className="muted small">· {p.country}</span></div>
                  <div className="muted small">{d.to || "⚠ add email"} · {d.subject}</div>
                </div>
                <div className="dueRight">
                  {canSendDirect && <button className="btn primary small" onClick={() => sendDirect(p)} disabled={!d.to}>✉ Send now</button>}
                  <a className={`btn ghost small ${!d.to ? "disabledLink" : ""}`} href={d.to ? outlookCompose(d) : undefined} target="_blank" rel="noreferrer" onClick={() => d.to && sendLog(p.id)}>Outlook compose</a>
                </div>
              </li>
            );
          })}
        </ul>
      )}

      {sent.length > 0 && (
        <>
          <div className="sectionLabel">Sent ({sent.length})</div>
          <ul className="apprList">
            {sent.map((p) => (
              <li key={p.id} className="apprItem sentItem">
                <div className="apprMain"><div className="dueName">{p.name}</div><div className="muted small">sent {p.lastContacted} · {p.country}</div></div>
                <span className="apprBadge" style={{ color: "var(--cyan)", borderColor: "var(--cyan)" }}>Sent</span>
              </li>
            ))}
          </ul>
        </>
      )}

      <p className="finePrint" style={{ marginTop: 18 }}>
        Note on real role separation: this models the approval flow in one view. True admin-only control (where reps genuinely can't self-approve) needs accounts and server-side roles — that's the connected-backend step, alongside Microsoft 365 sign-in via Graph if you later want sends logged automatically. Even then, a person confirms each send.
      </p>
    </div>
  );
}

/* ============================== MARKETS ============================== */
function Markets({ state, patch }) {
  const addRegion = () => patch((n) => n.regions.push({ id: uid(), name: "New region", countries: [] }));
  const setRegion = (id, name) => patch((n) => { n.regions.find((r) => r.id === id).name = name; });
  const delRegion = (id) => patch((n) => { n.regions = n.regions.filter((r) => r.id !== id); });
  const addCountry = (id, val) => patch((n) => { const r = n.regions.find((x) => x.id === id); if (val.trim() && !r.countries.includes(val.trim())) r.countries.push(val.trim()); });
  const delCountry = (id, c) => patch((n) => { const r = n.regions.find((x) => x.id === id); r.countries = r.countries.filter((x) => x !== c); });

  return (
    <div>
      <div className="panelIntro">
        <h2>Regions & countries</h2>
        <p>Your target footprint for OxeFit. Build a per-country list here, then add prospects against each. Edit anything — pre-loaded with Middle East, Africa, CEE, APAC and Australia.</p>
      </div>
      {state.regions.map((r) => {
        const count = state.prospects.filter((p) => p.region === r.name).length;
        return (
          <div className="regionCard" key={r.id}>
            <div className="regionHead">
              <input className="regionName" value={r.name} onChange={(e) => setRegion(r.id, e.target.value)} />
              <span className="muted small">{r.countries.length} countries · {count} prospects</span>
              <button className="iconBtn" onClick={() => delRegion(r.id)}>✕</button>
            </div>
            <div className="chips">
              {r.countries.map((c) => {
                const n = state.prospects.filter((p) => p.country === c && p.region === r.name).length;
                return (
                  <span className="countryChip" key={c}>
                    {c}{n > 0 && <span className="chipCount">{n}</span>}
                    <button className="xMini" onClick={() => delCountry(r.id, c)}>✕</button>
                  </span>
                );
              })}
              <CountryAdder onAdd={(v) => addCountry(r.id, v)} />
            </div>
          </div>
        );
      })}
      <button className="btn ghost" onClick={addRegion}>+ Add region</button>
    </div>
  );
}
function CountryAdder({ onAdd }) {
  const [v, setV] = useState("");
  return (
    <span className="countryAdd">
      <input placeholder="+ country" value={v} onChange={(e) => setV(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") { onAdd(v); setV(""); } }} />
    </span>
  );
}

/* ============================== EXPORT ============================== */
function ExportMenu({ state, flash, setState }) {
  const [open, setOpen] = useState(false);
  const [importing, setImporting] = useState(false);

  const dl = (content, name, type) => {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
    setOpen(false); flash("Exported");
  };
  // export in the same shape import expects (round-trips cleanly)
  const csv = () => {
    const head = ["name", "type", "region", "country", "website", "contactName", "contactEmail", "notes", "decisionMaker", "linkedIn", "competitors", "s1", "s2", "s3", "s4", "s5", "s6", "s7", "s8"];
    const rows = state.prospects.map((p) => [
      p.name, p.type, p.region, p.country, p.website || "", p.contactName || "", p.contactEmail || "", (p.notes || "").replace(/\n/g, " "),
      p.decisionMaker || "", p.linkedIn || "", p.competitors || "",
      ...state.criteria.slice(0, 8).map((c) => p.scores?.[c.id] ?? 0),
    ]);
    const esc = (v) => `"${String(v).replace(/"/g, '""')}"`;
    dl([head, ...rows].map((r) => r.map(esc).join(",")).join("\n"), "oxefit-distribution.csv", "text/csv");
  };
  const reset = () => {
    if (confirm("Reset all data to defaults? This clears your prospects.")) {
      setState(defaultState()); setOpen(false); flash("Reset to defaults");
    }
  };
  const loadStarter = () => {
    setState((s) => {
      const { merged, addedCount, skipped } = mergeProspects(s.prospects, starterProspects(s.criteria));
      flash(addedCount ? `Loaded ${addedCount} prospect${addedCount > 1 ? "s" : ""}${skipped ? ` · ${skipped} already present` : ""}` : "Starter set already loaded");
      return { ...s, prospects: merged };
    });
    setOpen(false);
  };
  const loadGlobal = () => {
    setState((s) => {
      const { merged, addedCount, skipped } = mergeProspects(s.prospects, globalProspects(s.criteria));
      flash(addedCount ? `Loaded ${addedCount} prospect${addedCount > 1 ? "s" : ""}${skipped ? ` · ${skipped} already present` : ""}` : "Expansion set already loaded");
      return { ...s, prospects: merged };
    });
    setOpen(false);
  };
  const loadPartners = () => {
    setState((s) => {
      const { merged, addedCount, skipped } = mergeProspects(s.prospects, partnerProspects(s.criteria));
      flash(addedCount ? `Loaded ${addedCount} prospect${addedCount > 1 ? "s" : ""}${skipped ? ` · ${skipped} already present` : ""}` : "Fit-out & partner set already loaded");
      return { ...s, prospects: merged };
    });
    setOpen(false);
  };
  const loadExpand2 = () => {
    setState((s) => {
      const { merged, addedCount, skipped } = mergeProspects(s.prospects, expand2Prospects(s.criteria));
      flash(addedCount ? `Loaded ${addedCount} prospect${addedCount > 1 ? "s" : ""}${skipped ? ` · ${skipped} already present` : ""}` : "Expansion II already loaded");
      return { ...s, prospects: merged };
    });
    setOpen(false);
  };
  const doImport = (text) => {
    let incoming = [];
    const trimmed = text.trim();
    try {
      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        const parsed = JSON.parse(trimmed);
        const arr = Array.isArray(parsed) ? parsed : parsed.prospects || [];
        incoming = arr.map((p) => ({
          id: uid(), name: p.name || "Unnamed", type: p.type || "Distributor",
          region: p.region || "", country: p.country || "", website: p.website || "",
          decisionMaker: p.decisionMaker || "", linkedIn: p.linkedIn || "",
          competitors: p.competitors || COMPETITORS[p.name] || "",
          contactName: p.contactName || "", contactEmail: p.contactEmail || "", notes: p.notes || "",
          emailSubject: p.emailSubject || "", emailBody: p.emailBody || "",
          scores: p.scores && typeof p.scores === "object"
            ? Object.fromEntries(state.criteria.map((c) => [c.id, Number(p.scores[c.id]) || 0]))
            : Object.fromEntries(state.criteria.map((c) => [c.id, 0])),
          status: p.status || "new", lastContacted: p.lastContacted || null, contactCount: p.contactCount || 0,
          emailApproval: p.emailApproval || "none",
        })).filter((p) => p.name !== "Unnamed");
      } else {
        incoming = rowsToProspects(parseCSV(trimmed), state.criteria);
      }
    } catch {
      flash("Couldn't parse — check the format"); return;
    }
    if (!incoming.length) { flash("No rows found to import"); return; }
    setState((s) => {
      const { merged, addedCount, skipped } = mergeProspects(s.prospects, incoming);
      flash(`Imported ${addedCount}${skipped ? ` · ${skipped} duplicate${skipped > 1 ? "s" : ""} skipped` : ""}`);
      return { ...s, prospects: merged };
    });
    setImporting(false);
  };

  return (
    <div className="exportWrap">
      <button className="btn ghost" onClick={() => setOpen((o) => !o)}>Data ▾</button>
      {open && (
        <div className="menu" onMouseLeave={() => setOpen(false)}>
          <button onClick={loadStarter}>★ Load Middle East set (UAE + KSA)</button>
          <button onClick={loadGlobal}>★ Load expansion set (APAC · AU · Africa · CEE)</button>
          <button onClick={loadPartners}>★ Load fit-out &amp; partner set (UAE · KSA · India · AU)</button>
          <button onClick={loadExpand2}>★ Load expansion II (Gulf · Africa · CEE · SE Asia)</button>
          <button onClick={() => { setImporting(true); setOpen(false); }}>Import CSV / JSON…</button>
          <div className="menuSep" />
          <button onClick={csv}>Download CSV</button>
          <button onClick={() => dl(JSON.stringify(state, null, 2), "oxefit-distribution.json", "application/json")}>Download JSON (backup)</button>
          <button className="menuDanger" onClick={reset}>Reset to defaults</button>
        </div>
      )}
      {importing && <ImportModal onClose={() => setImporting(false)} onImport={doImport} />}
    </div>
  );
}

function ImportModal({ onClose, onImport }) {
  const [text, setText] = useState("");
  const onFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => setText(String(r.result || ""));
    r.readAsText(f);
  };
  return (
    <div className="drawerScrim" style={{ justifyContent: "center", alignItems: "center" }} onClick={onClose}>
      <div className="importCard" onClick={(e) => e.stopPropagation()}>
        <div className="drawerHead">
          <div className="drawerName-static">Import prospects</div>
          <button className="iconBtn" onClick={onClose}>✕</button>
        </div>
        <div className="importBody">
          <p className="muted small" style={{ marginTop: 0 }}>
            Paste <b>CSV</b> or <b>JSON</b>, or choose a file. Existing prospects stay; duplicates (same company + country) are skipped.
          </p>
          <div className="csvHint">
            CSV header: <code>name,type,region,country,website,contactName,contactEmail,notes,decisionMaker,linkedIn,competitors,s1…s8</code><br />
            <span className="muted">s1–s8 are 0–5 scores in your criteria order — optional, leave blank for unscored. A downloaded CSV re-imports as-is.</span>
          </div>
          <input type="file" accept=".csv,.json,.txt" onChange={onFile} className="fileInput" />
          <textarea className="importArea" rows={9} placeholder="Paste CSV or JSON here…" value={text} onChange={(e) => setText(e.target.value)} />
          <div className="mailActions">
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn primary" onClick={() => onImport(text)} disabled={!text.trim()}>Import</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================== SMALL UI ============================== */
function Select({ value, onChange, options }) {

    <select className="select" value={value} onChange={(e) => onChange(e.target.value)}>
      {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}

}
function Field({ label, value, onChange, autoFocus }) {
  return (
    <label className="field">
      <span>{label}</span>
      <input value={value || ""} autoFocus={autoFocus} onChange={(e) => onChange(e.target.value)} />
    </label>
  );
}
function FieldArea({ label, value, onChange, rows = 3 }) {
  return (
    <label className="field">
      <span>{label}</span>
      <textarea rows={rows} value={value || ""} onChange={(e) => onChange(e.target.value)} />
    </label>
  );
}
function SelectField({ label, value, onChange, options, render }) {
  return (
    <label className="field">
      <span>{label}</span>
      <select value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => <option key={o} value={o}>{render ? render(o) : o}</option>)}
